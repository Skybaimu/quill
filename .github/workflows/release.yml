name: 'Publish Tauri Apps'

on:
  push:
    tags:
      - 'v*' # 仅在推送以 'v' 开头的 tag 时触发（例如 v1.0.0）

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # 矩阵构建：同时在 Mac 和 Windows 上运行
        include:
          - platform: 'macos-latest' # macOS 最新版本
            args: ''
          - platform: 'windows-latest' # Windows x64
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      # Ubuntu/Linux 如果后续需要支持，在这里安装相关系统依赖
      # - name: Install dependencies (ubuntu only)
      #   if: matrix.platform == 'ubuntu-22.04'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install # change this to npm or pnpm depending on which one you use

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quill ${{ github.ref_name }}'
          releaseBody: 'Quill 最新版本安装包已生成。您可以直接下载对应的系统版本安装体验。'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}